<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Reel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">
        reel
    </div>
</header>

<main>
    <section class="stories-section">
        <div class="stories-label">Top this week
        </div>
        <div class="stories-row">
            <div class="story">
                <div class="story-poster">🎲</div>
                <div class="story-title">Jumanji</div>
            </div>

            <div class="story">
                <div class="story-poster">🎈</div>
                <div class="story-title">up</div>
            </div>

            <div class="story">
                <div class="story-poster">🐠</div>
                <div class="story-title">Nemo</div>
            </div>

        </div>

    </section>

    <section class="netflix-section">
        <div class="stories-label">New on Netflix</div>
        <div class="netflix-row">
            <div class="netflix-card">
                <div class="netflix-thumb">🛰️</div>
                <div class="netflix-title">Stranger Circuits</div>
            </div>

            <div class="netflix-card">
                <div class="netflix-thumb">📼</div>
                <div class="netflix-title">The Last Reel</div>
            </div>
        </div>

    </section>
    <section class="amazon-section">
        <div class="stories-label">New on Amazon prime</div>
        <div class="amazon-row">
            <div class="amazon-card">
                <div class="amazon-thumb">🕵️</div>
                <div class="amazon-title">Boys</div>
            </div>

            <div class="amazon-card">
                <div class="amazon-thumb">💪</div>
                <div class="amazon-title">Jack reacher</div>
            </div>
        </div>
    </section>
    <section class="movie-section">
        <div class="movie-label">Recently Reviewed</div>
        <div class="movie-grid">
             <div class="movie-card">
                <div class="movie-poster">🎲</div>
                <div class="movie-title">Jumanji</div>
                <div class="movie-meta">Adventure · 2017</div>
             </div>
             <div class="movie-card">
                <div class="movie-poster">🎈</div>
                <div class="movie-title">Up</div>
                <div class="movie-meta">Animation · 2009</div>
             </div>
             <div class="movie-card">
                <div class="movie-poster">🐠</div>
                <div class="movie-title">Finding Nemo</div>
                <div class="movie-meta">Animation · 2003</div>
             </div>
        </div>

    </section>
</main>

<footer>

</footer>


</body>
</html>
